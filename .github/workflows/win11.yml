name: RDP + Tailscale + RustDesk + Backup
on:
  workflow_dispatch:
    inputs:
      ts_tailnet:
        description: "Tailscale tailnet (e.g. you@gmail.com)"
        required: true
      ts_api_key:
        description: "Tailscale API key (device admin, no Bearer)"
        required: true
      ts_authkey:
        description: "Tailscale Auth key (reusable or ephemeral)"
        required: true
      quick_test:
        description: "Run 5-minute test"
        type: boolean
        default: false
      runtime_minutes:
        description: "Runtime (max 360; default 355 when not test)"
        required: false
        default: "355"
      do_purge:
        description: "Purge bullet* devices at start (single instance only)"
        required: false
        default: "true"
      cycles:
        description: "0=stop after A; N=handoffs left incl this run"
        required: false
        default: "0"
      rdp_count:
        description: "How many RDP instances (1-10) [ignored if CRD provided]"
        required: false
        default: "1"
      crd_code:
        description: >-
          Paste raw CRD code (4/0AV...), full PowerShell command, or text/URL containing --code="4/...".
          If provided -> single instance; CRD launches first.
        required: false
        default: ""
      crd_pin:
        description: "CRD PIN (6–12 digits). Used when launching CRD to avoid interactive prompt."
        required: false
        default: "123456"
      backup_url:
        description: "Optional Gofile backup link to restore previous session"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      multi: ${{ steps.mk.outputs.multi }}
    steps:
      - id: mk
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          
          if ($crd.Length -gt 0) { $n = 1 } else { $n = [int]"${{ inputs.rdp_count }}"; if ($n -lt 1) { $n = 1 }; if ($n -gt 10) { $n = 10 } }
          $inc = @(); for ($i=1; $i -le $n; $i++){ $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          $multi = if ($n -gt 1) { '1' } else { '0' }
          "multi=$multi" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 370
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345

    steps:
      # --- RESTORE BACKUP USING PYTHON DOWNLOADER ---
      - name: Restore backup from Gofile (if provided)
        if: ${{ inputs.backup_url != '' }}
        run: |
          $backupUrl = "${{ inputs.backup_url }}"
          $restoreDir = "$env:TEMP\restore_${{ matrix.id }}"
          
          Write-Host "=== Restoring backup from Gofile ==="
          Write-Host "Backup URL: $backupUrl"
          
          # Create restore directory
          New-Item -ItemType Directory -Path $restoreDir -Force | Out-Null
          
          # Python Gofile Downloader Script
          $pythonScript = @'
#! /usr/bin/env python3


from os import getcwd, getenv, listdir, makedirs, name, path, rmdir
from sys import argv, exit, stdout, stderr
from typing import Any, Iterator, NoReturn, TextIO
from types import FrameType
from itertools import count
from requests import Session, Response, Timeout
from requests.structures import CaseInsensitiveDict
from concurrent.futures import ThreadPoolExecutor
from threading import Event
from hashlib import sha256
from shutil import move
from signal import signal, SIGINT, SIG_IGN
from time import perf_counter, time


NEW_LINE: str = "\n" if name != "nt" else "\r\n"


def has_ansi_support() -> bool:
    """
    has_ansi_support

    Checks whether the platform support ansi or not.

    :return: True if the platform supports it.
    """

    import os
    import sys

    if not sys.stdout.isatty():
        return False

    if os.name == "nt":
        # Not sure, but I think the console on win10+ have default ansi support
        return sys.getwindowsversion().major >= 10

    # I hope the rest supports it??
    return True


# I hope these 100 character are enough for fallback,
# anyone using win7 still?
TERMINAL_CLEAR_LINE: str = f"\r{' ' * 100} \r" if not has_ansi_support() else "\033[2K\r"


def _print(msg: str, error: bool = False) -> None:
    """
    _print

    Print a message.

    :param msg: a string to be printed.
    :param error: if the error stream output should be used instead of the standard output.
    :return:
    """

    output: TextIO = stderr if error else stdout
    output.write(msg)
    output.flush()


def die(msg: str) -> NoReturn:
    """
    die

    Display a message of error and exit.

    :param msg: a string to be printed.
    :return:
    """

    _print(f"{msg}{NEW_LINE}", True)
    exit(-1)


def generate_website_token(user_agent: str, account_token: str) -> str:
    """
    generate_website_token

    Generates the dynamic X-Website-Token required by GoFile API.
    """
    time_slot = int(time()) // 14400
    raw = f"{user_agent}::en-US::{account_token}::{time_slot}::5d4f7g8sd45fsd"
    return sha256(raw.encode()).hexdigest()


class Downloader:
    def __init__(
        self,
        root_dir: str,
        interactive: bool,
        max_workers: int,
        number_retries,
        timeout: float,
        chunk_size: int,
        stop_event: Event,
        session: Session,
        url: str,
        password: str | None = None,
    ) -> None:
        """
        Downloader

        Downloader class to concurrently manage, download and write files to disk.
        This one does the heavy lifting, the actual working of downloading.

        :root_dir: Directory where files will be saved (defaults to current directory).
        :interactive: Whether download will be interactive or not
                      (it's disabled by default while batch downloading from a text file)
        :max_workers: Maximum number of concurrent workers (tasks).
        :number_retries: The maximum number of connections retries for POST and GET requests.
        :timeout: Maximum number of time to wait until give up on trying to establish a connection.
        :chunk_size: Maximum chunk byte size.
        :stop_event: An Event object to handle the request to stop the program and exit gracefully.
        :session: Session object to handle headers, cookies and allowing reuse of resources and TCP connections.
        :url: The content url to download.
        :password: The content password if it's protected.
        """

        # Dictionary to hold information about file and its directories structure
        # {"index": {"path": "", "filename": "", "link": ""}}
        # where the largest index is the top most file
        self._files_info: dict[str, dict[str, str]] = {}

        self._max_workers: int = max_workers
        self._number_retries: int = number_retries
        self._timeout: float = timeout
        self._interactive: bool = interactive
        self._chunk_size: int = chunk_size
        self._password: str | None = password
        self._session: Session = session
        self._stop_event: Event = stop_event
        self._root_dir: str = root_dir
        self._url: str = url


    def run(self) -> None:
        """
        run

        Requests to start downloading files.

        :return:
        """

        try:
            if not self._url.split("/")[-2] == "d":
                _print(f"The url probably doesn't have an id in it: {self._url}.{NEW_LINE}")
                return

            content_id: str = self._url.split("/")[-1]
        except IndexError:
            _print(f"{self._url} doesn't seem a valid url.{NEW_LINE}")
            return

        _password: str | None = sha256(self._password.encode()).hexdigest() if self._password else None

        content_dir: str = path.join(self._root_dir, content_id)
        self._build_content_tree_structure(content_dir, content_id, _password)

        # removes the root content directory if there's no file or subdirectory
        if path.exists(content_dir) and not listdir(content_dir) and not self._files_info:
            _print(f"Empty directory for url: {self._url}, nothing done.{NEW_LINE}")
            self._remove_dir(content_dir)
            return

        if self._interactive:
            self._do_interactive(content_dir)

        self._threaded_downloads()


    def _get_response(self, **kwargs: Any) -> Response | None:
        """
        _get_response

        Auxiliary function for the requests.session.get.

        :param kwargs: arguments for the requests.session.get function.
        :return: requests.Response or None on requests.Timeout.
        """

        for _ in range(self._number_retries):
            try:
                return self._session.get(timeout=self._timeout, **kwargs)
            except Timeout:
                continue


    def _threaded_downloads(self) -> None:
        """
        _threaded_downloads

        Parallelize the downloads.

        :return:
        """

        with ThreadPoolExecutor(max_workers=self._max_workers) as executor:
            for item in self._files_info.values():
                if self._stop_event.is_set():
                    return

                executor.submit(self._download_content, item)


    @staticmethod
    def _create_dirs(dirname: str) -> None:
        """
        _create_dirs

        Creates a directory and its subdirectories recursively if they don't exist.

        :param dirname: name of the directory to be created.
        :return:
        """

        makedirs(dirname, exist_ok = True)


    @staticmethod
    def _remove_dir(dirname: str) -> None:
        """
        _remove_dir

        Removes a directory if it's empty ignoring any throw.

        :param dirname: name of the directory to be created.
        :return:
        """

        try:
            rmdir(dirname)
        except:
            pass


    def _download_content(self, file_info: dict[str, str]) -> None:
        """
        _download_content

        Requests the contents of the file and writes it.

        :param file_info: a dictionary with information about a file to be downloaded.
        :return:
        """

        filepath: str = path.join(file_info["path"], file_info["filename"])

        if self._should_skip_download(filepath):
            return

        tmp_file: str =  f"{filepath}.part"
        url: str = file_info["link"]

        headers: dict[str, str] = {}
        if path.isfile(tmp_file):
            part_size = int(path.getsize(tmp_file))
            headers = {"Range": f"bytes={part_size}-"}

        for _ in range(self._number_retries):
            try:
                part_size: int = 0
                if path.isfile(tmp_file):
                    part_size = int(path.getsize(tmp_file))
                    headers = {"Range": f"bytes={part_size}-"}

                has_size: str | None = self._perform_download(
                    file_info,
                    url,
                    tmp_file,
                    headers,
                    part_size
                )
            except Timeout:
                continue
            else:
                if has_size:
                    self._finalize_download(file_info, tmp_file, has_size)
                break


    @staticmethod
    def _should_skip_download(filepath: str) -> bool:
        """
        _should_skip_download

        Checks if a file already exists and has non-zero size.

        :param filepath: filepath.
        :return: True if download should be skipped, False otherwise.
        """

        if path.exists(filepath) and path.getsize(filepath) > 0:
            _print(f"{filepath} already exist, skipping.{NEW_LINE}")
            return True
        return False


    def _perform_download(
        self,
        file_info: dict[str, str],
        url: str,
        tmp_file: str,
        headers: dict[str, str],
        part_size: int,
    ) -> str | None:
        """
        _perform_download

        Executes the HTTP GET request, processes file chunks, and tracks progress.

        :param file_info: a dictionary containing file details.
        :param url: the file download URL.
        :param tmp_file: temporary file path for partial downloads.
        :param headers: request headers.
        :param part_size: the current partial file size.
        :return: the total file size (if available).
        """

        if self._stop_event.is_set():
            return

        response: Response | None = self._get_response(url=url, headers=headers, stream=True)

        if not response:
            _print(
                f"{TERMINAL_CLEAR_LINE}Couldn't download the file, failed to get a response from {url}.{NEW_LINE}"
            )
            return None

        with response:
            status_code: int = response.status_code

            if not self._is_valid_response(response.status_code, part_size):
                _print(str(self._session.headers))
                _print(
                    f"{TERMINAL_CLEAR_LINE}"
                    f"Couldn't download the file from {url}.{NEW_LINE}"
                    f"Status code: {status_code}{NEW_LINE}"
                )
                return None

            has_size: str | None = self._extract_file_size(response.headers, part_size)

            if not has_size:
                _print(
                    f"{TERMINAL_CLEAR_LINE}"
                    f"Couldn't find the file size from {url}.{NEW_LINE}"
                    f"Status code: {status_code}{NEW_LINE}"
                )
                return None

            self._write_chunks(
                response.iter_content(chunk_size=self._chunk_size),
                tmp_file,
                part_size,
                float(has_size),
                file_info["filename"]
            )

            return has_size


    @staticmethod
    def _is_valid_response(status_code: int, part_size: int) -> bool:
        """
        _is_valid_response

        Validates HTTP status code based on partial download state.

        :param status_code: the HTTP status code.
        :param part_size: the current partial file size.
        :return: True if status code is acceptable, False otherwise.
        """

        if status_code in (403, 404, 405, 500):
            return False
        if part_size == 0:
            return status_code in (200, 206)
        if part_size > 0:
            return status_code == 206
        return False


    @staticmethod
    def _extract_file_size(headers: CaseInsensitiveDict[str], part_size: int) -> str | None:
        """
        _extract_file_size

        Retrieves the file size from HTTP headers.

        :param headers: the HTTP response headers.
        :param part_size: the current partial file size.
        :return: the total file size as a string, or None if unavailable.
        """

        content_length: str | None = headers.get("Content-Length")
        content_range: str | None = headers.get("Content-Range")
        has_size: str | None = (
            content_length if part_size == 0
            else content_range.split("/")[-1] if content_range
            else None
        )

        return has_size


    def _write_chunks(
        self,
        chunks: Iterator[Any],
        tmp_file: str,
        part_size: int,
        total_size: float,
        filename: str
    ) -> None:
        """
        _write_chunks

        Iterates over download chunks and writes them to disk, updating progress.

        :param chunks: a generator of byte chunks.
        :param tmp_file: temporary file path.
        :param part_size: number of bytes already downloaded.
        :param total_size: total file size in bytes.
        :param filename: the file's name.
        :return:
        """

        start_time: float = perf_counter()

        with open(tmp_file, "ab") as f:
            for i, chunk in enumerate(chunks):
                if self._stop_event.is_set():
                    return

                f.write(chunk)
                self._update_progress(filename, part_size, i, chunk, total_size, start_time)


    def _update_progress(
        self,
        filename: str,
        part_size: int,
        i: int,
        chunk: bytes,
        total_size: float,
        start_time: float
    ) -> None:
        """
        _update_progress

        Calculates and displays download progress and transfer rate.

        :param filename: the name of the file being downloaded.
        :param part_size: initial file size in bytes.
        :param i: current iteration number.
        :param chunk: the downloaded byte chunk.
        :param total_size: total file size.
        :param start_time: download start time.
        :return:
        """

        progress: float = (part_size + (i * len(chunk))) / total_size * 100
        rate: float = (i * len(chunk)) / (perf_counter() - start_time)

        unit: str = "B/s"
        if rate < 1024:
            unit = "B/s"
        elif rate < (1024 ** 2):
            rate /= 1024
            unit = "KB/s"
        elif rate < (1024 ** 3):
            rate /= (1024 ** 2)
            unit = "MB/s"
        else:
            rate /= (1024 ** 3)
            unit = "GB/s"

        _print(
            f"{TERMINAL_CLEAR_LINE}"
            f"Downloading {filename}: {part_size + i * len(chunk)} "
            f"of {int(total_size)} {round(progress, 1)}% {round(rate, 1)}{unit}"
        )


    @staticmethod
    def _finalize_download(file_info: dict[str, str], tmp_file: str, has_size: str) -> None:
        """
        _finalize_download

        Verifies the final file size and moves the temporary file to its destination.

        :param file_info: a dictionary containing file details.
        :param tmp_file: temporary file path.
        :param has_size: expected file size.
        :return:
        """

        if path.getsize(tmp_file) == int(has_size):
            _print(
                f"{TERMINAL_CLEAR_LINE}"
                f"Downloading {file_info['filename']}: {path.getsize(tmp_file)} "
                f"of {has_size} Done!{NEW_LINE}"
            )
            move(tmp_file, path.join(file_info["path"], file_info["filename"]))


    def _register_file(self, file_index: count, filepath: str, file_url: str) -> None:
        """
        _register_file

        Registers file information into the internal files info dictionary
        (with sequential index, path, filename and download url).

        :param file_index: an itertools.count object used to sequentially index discovered files.
                           Acts as a mutable counter local to the parsing thread context.
                           Should not be modified outside this function.
        :param filepath: absolute or relative path to the file on the local filesystem.
        :param file_url: remote URL link for downloading the file.
        :return:
        """

        self._files_info[str(next(file_index))] = {
            "path": path.dirname(filepath),
            "filename": path.basename(filepath),
            "link": file_url
        }


    @staticmethod
    def _resolve_naming_collision(
        pathing_count: dict[str, int],
        absolute_parent_dir: str,
        child_name: str,
        is_dir: bool = False,
    ) -> str:
        """
        _resolve_naming_collision

        Ensures unique file or directory paths by checking and updating a naming collision
        tracker. If a collision is detected, appends a numeric suffix to the name to
        avoid overwriting existing paths.

        :param pathing_count: dictionary used to track the number of naming collisions
                              for each path encountered during traversal.
        :param absolute_parent_dir: absolute path to the parent directory where the child
                                    (file or directory) will be created.
        :param child_name: original name of the file or directory.
        :param is_dir: boolean flag indicating whether the child is a directory, defaults to False.
        :return: a unique filepath string with a numeric suffix appended if needed.
        """

        filepath: str = path.join(absolute_parent_dir, child_name)

        if filepath in pathing_count:
            pathing_count[filepath] += 1
        else:
            pathing_count[filepath] = 0

        if pathing_count and pathing_count[filepath] > 0 and is_dir:
            return f"{filepath}({pathing_count[filepath]})"

        if pathing_count and pathing_count[filepath] > 0:
            extension: str
            root, extension = path.splitext(filepath)

            return f"{root}({pathing_count[filepath]}){extension}"

        return filepath


    def _build_content_tree_structure(
        self,
        parent_dir: str,
        content_id: str,
        password: str | None = None,
        pathing_count: dict[str, int] | None = None,
        file_index: count = count(start=0, step=1)
    ) -> None:
        """
        _build_content_tree_structure

        Recursively traverses a remote content structure and builds a corresponding
        local directory tree (handling naming collisions), while registering files url.

        :param parent_dir: absolute path to the parent directory where the current content
                           directory or file should be created.
        :param content_id: content identifier.
        :param password: optional password to access protected content.
        :param pathing_count: pointer-like dictionary used internally to track naming collisions
                              for file and directory paths. Should not be modified outside this function.
        :param file_index: an itertools.count object used to sequentially index discovered files.
                           Acts as a mutable counter local to the parsing thread context.
                           Should not be modified outside this function.
        :return:
        """

        url: str = f"https://api.gofile.io/contents/{content_id}?cache=true&sortField=createTime&sortDirection=1"

        if not pathing_count:
            pathing_count = {}

        if password:
            url = f"{url}&password={password}"

        user_agent: str = str(self._session.headers.get("User-Agent", "Mozilla/5.0"))
        auth_header: str = str(self._session.headers.get("Authorization", ""))
        account_token: str = auth_header.replace("Bearer ", "") if auth_header else ""
        wt: str = generate_website_token(user_agent, account_token)

        response: Response | None = self._get_response(
            url=url,
            headers={
                "X-Website-Token": wt,
                "X-BL": "en-US"
            }
        )
        json_response: dict[str, Any] = {} if not response else response.json()

        if not json_response or json_response["status"] != "ok":
            _print(f"Failed to fetch data response from the {url}.{NEW_LINE}")
            return

        data: dict[str, Any] = json_response["data"]

        if "password" in data and "passwordStatus" in data and data["passwordStatus"] != "passwordOk":
            _print(f"Password protected link. Please provide the password.{NEW_LINE}")
            return

        if data["type"] != "folder":
            filepath: str = self._resolve_naming_collision(pathing_count, parent_dir, data["name"])

            self._register_file(file_index, filepath, data["link"])
            return

        folder_name: str = data["name"]
        absolute_path: str = self._resolve_naming_collision(pathing_count, parent_dir, folder_name)

        # If the content directory (the root directory) directory isn't named the same as the content_id,
        # use the content_id as a name for the content directory.
        #
        # Also do not use the default root directory named as "root" created by default.
        if path.basename(parent_dir) == content_id:
            absolute_path = parent_dir

        self._create_dirs(absolute_path)

        # Checks if there is any children (files and directories) and handle them
        for child in data["children"].values():
            if child["type"] == "folder":
                self._build_content_tree_structure(absolute_path, child["id"], password, pathing_count, file_index)
            else:
                filepath: str = self._resolve_naming_collision(pathing_count, absolute_path, child["name"])

                self._register_file(file_index, filepath, child["link"])


    def _print_list_files(self) -> None:
        """
        _print_list_files

        Helper function to display a list of all files for selection.

        :return:
        """

        MAX_FILENAME_CHARACTERS: int = 100
        width: int = max(len(f"[{v}] -> ") for v in self._files_info.keys())

        for (k, v) in self._files_info.items():
            # Trim the filepath if it's too long
            filepath: str = path.join(v["path"], v["filename"])
            filepath = f"...{filepath[-MAX_FILENAME_CHARACTERS:]}" \
                if len(filepath) > MAX_FILENAME_CHARACTERS \
                else filepath

            text: str =  f"{f'[{k}] -> '.ljust(width)}{filepath}"

            _print(f"{text}{NEW_LINE}"
                   f"{'-' * len(text)}"
                   f"{NEW_LINE}"
            )


    def _do_interactive(self, content_dir: str) -> None:
        """
        _do_interactive

        Performs interactive file selection for download.

        :param content_dir: Content root directory.
        :return:
        """

        self._print_list_files()

        # Ensure only valid index strings are stored.
        input_list: set[str] = set(input(
            f"Files to download (Ex: 1 3 7) | or leave empty to download them all"
            f"{NEW_LINE}"
            f":: "
        ).split())
        input_list = set(self._files_info.keys()) if not input_list \
                     else input_list & set(self._files_info.keys())

        if not input_list:
            _print(f"Nothing done.{NEW_LINE}")
            self._remove_dir(content_dir)
            return

        keys_to_delete: list[str] = list(set(self._files_info.keys()) - set(input_list))

        for key in keys_to_delete:
            del self._files_info[key]



class Manager:
    def __init__(self, url_or_file: str, password: str | None = None) -> None:
        """
        Manager

        Manager class to handle individual download tasks.

        :url_or_file: This may be an existent text file or url.
        :password: Password if the content is protected.
        :return:
        """

        root_dir: str | None = getenv("GF_DOWNLOAD_DIR")

        # Defaults to 5 concurrent downloads
        self._max_workers: int = int(getenv("GF_MAX_CONCURRENT_DOWNLOADS", 5))
        # Defaults to 5 retries
        self._number_retries: int = int(getenv("GF_MAX_RETRIES", 5))
        # Connection and read timeout, defaults to 15 seconds
        self._timeout: float = float(getenv("GF_TIMEOUT", 15.0))
        self._user_agent: str | None = getenv("GF_USERAGENT")
        self._interactive: bool = getenv("GF_INTERACTIVE") == "1"
        # The number of bytes it should read into memory
        self._chunk_size: int = int(getenv("GF_CHUNK_SIZE", 2097152))

        self._password: str | None = password
        self._url_or_file: str = url_or_file

        self._session: Session = Session()
        self._stop_event: Event = Event()
        self._root_dir: str = root_dir if root_dir else getcwd()

        self._session.headers.update({
            "Accept-Encoding": "gzip",
            "User-Agent": self._user_agent if self._user_agent else "Mozilla/5.0",
            "Connection": "keep-alive",
            "Accept": "*/*",
            "Origin": "https://gofile.io",
            "Referer": "https://gofile.io/",
        })


    def _parse_url_or_file(self) -> None:
        """
        _parse_url_or_file

        Parses a file or a url for possible links.

        :return:
        """

        if not (path.exists(self._url_or_file) and path.isfile(self._url_or_file)):
            downloader: Downloader = Downloader(
                self._root_dir,
                self._interactive,
                self._max_workers,
                self._number_retries,
                self._timeout,
                self._chunk_size,
                self._stop_event,
                self._session,
                self._url_or_file,
                self._password
            )

            downloader.run()

            return

        with open(self._url_or_file, "r") as f:
            lines: list[str] = f.readlines()

        # I think it's better to limit this one here, the api may get angry if we starve it.
        # We may make this a tunable in the future, but for now let it be hardcoded.
        max_workers: int = self._max_workers if self._max_workers <= 10 else 10

        with ThreadPoolExecutor(max_workers=max_workers) as executor:
            for line in lines:
                if self._stop_event.is_set():
                    return

                line_splitted: list[str] = line.split(" ")
                url: str = line_splitted[0].strip()
                password: str | None = self._password if self._password else line_splitted[1].strip() \
                    if len(line_splitted) > 1 else self._password
                downloader: Downloader = Downloader(
                    self._root_dir,
                    False, # Disable interactive download when downloading a batch from text file.
                    self._max_workers,
                    self._number_retries,
                    self._timeout,
                    self._chunk_size,
                    self._stop_event,
                    self._session,
                    url,
                    password
                )

                executor.submit(downloader.run)


    def run(self) -> None:
        """
        run

        This method starts the download process after the creation of the Downloader object.

        :return:
        """

        signal(SIGINT, self._handle_sigint)
        _print(f"Starting, please wait...{NEW_LINE}")
        self._set_account_access_token(getenv("GF_TOKEN"))
        self._parse_url_or_file()


    def _set_account_access_token(self, token: str | None = None) -> None:
        """
        _set_account_access_token

        Get a new access token for the account created or use the token provided for an already existent account.

        :param token: token to be used accross connections if available.
        :return:
        """

        if token:
            self._session.cookies.set("Cookie", f"accountToken={token}")
            self._session.headers.update({"Authorization": f"Bearer {token}"})
            return

        response: dict[Any, Any] = {}
        
        user_agent: str = str(self._session.headers.get("User-Agent", "Mozilla/5.0"))
        wt: str = generate_website_token(user_agent, "")

        for _ in range(self._number_retries):
            try:
                response = self._session.post(
                    "https://api.gofile.io/accounts",
                    headers={
                        "X-Website-Token": wt,
                        "X-BL": "en-US"
                    },
                    timeout=self._timeout
                ).json()
            except Timeout:
                continue
            else:
                break

        if not response and response["status"] != "ok":
            die("Account creation failed!")

        self._session.cookies.set("Cookie", f"accountToken={response['data']['token']}")
        self._session.headers.update({"Authorization": f"Bearer {response['data']['token']}"})


    def _stop(self) -> None:
        """
        _stop

        Stops all work from continuing.

        :return:
        """

        _print(f"{TERMINAL_CLEAR_LINE}Stopping, please wait...{NEW_LINE}")
        self._stop_event.set()


    def _handle_sigint(self, _: int, __: FrameType | None) -> None:
        """
        _handle_sigint

        Signal handler triggered when a SIGINT (when pressing CTRL-C) is received.
        Issues the stop event so that the running tasks can close gracefully,
        ignoring tasks that didn't start yet.

        :param signum:  Signal number received (for this callback usually SIGINT).
        :param frame:   FrameType object representing the current stack frame
                        where the received signal was caught.
        :return:
        """

        if not self._stop_event.is_set():
            self._stop()
            signal(SIGINT, SIG_IGN)


if __name__ == "__main__":
    url_or_file: str | None = None
    password: str | None = None
    argc: int = len(argv)

    if argc > 1:
        url_or_file = argv[1]

        if argc > 2:
            password = argv[2]

        manager: Manager = Manager(url_or_file=url_or_file, password=password)

        # Run
        manager.run()
    else:
        die(f"Usage:"
            f"{NEW_LINE}"
            f"python gofile-downloader.py https://gofile.io/d/contentid"
            f"{NEW_LINE}"
            f"python gofile-downloader.py https://gofile.io/d/contentid password"
        )
'@
          
          # Save script to temp file
          $scriptPath = "$env:TEMP\gofile_downloader_${{ matrix.id }}.py"
          $pythonScript | Out-File -FilePath $scriptPath -Encoding UTF8
          
          # Install requests if not available
          python -c "import requests" 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Installing requests module..."
            python -m pip install requests
          }
          
          # Change to restore directory and run the downloader
          Push-Location $restoreDir
          
          Write-Host "Downloading backup using Python downloader..."
          python $scriptPath $backupUrl
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Download failed with exit code: $LASTEXITCODE"
            Pop-Location
            exit 1
          }
          
          Pop-Location
          
          # Find the downloaded file (it will be in a subdirectory named with the content ID)
          $downloadedDirs = Get-ChildItem -Path $restoreDir -Directory
          $backupFile = $null
          
          foreach ($dir in $downloadedDirs) {
            $zipFile = Get-ChildItem -Path $dir.FullName -Filter "*.zip" | Select-Object -First 1
            if ($zipFile) {
              $backupFile = $zipFile
              break
            }
          }
          
          if (-not $backupFile) {
            Write-Error "No backup ZIP file found after download"
            exit 1
          }
          
          Write-Host "Found backup file: $($backupFile.FullName)"
          
          # Extract the backup
          Write-Host "Extracting backup..."
          $extractPath = "$env:TEMP\extract_${{ matrix.id }}"
          New-Item -ItemType Directory -Path $extractPath -Force | Out-Null
          Expand-Archive -Path $backupFile.FullName -DestinationPath $extractPath -Force
          
          # Restore files
          Write-Host "Restoring user data..."
          if (Test-Path "$extractPath\Users\Bullettemporary") {
            robocopy "$extractPath\Users\Bullettemporary" "C:\Users\Bullettemporary" /E /COPYALL /R:3 /W:5 /IT
            Write-Host "Restored Bullettemporary user data"
          }
          
          if (Test-Path "$extractPath\AppData") {
            robocopy "$extractPath\AppData" "$env:APPDATA" /E /COPYALL /R:3 /W:5 /IT
            Write-Host "Restored AppData"
          }
          
          if (Test-Path "$extractPath\Desktop") {
            robocopy "$extractPath\Desktop" "$env:USERPROFILE\Desktop" /E /COPYALL /R:3 /W:5 /IT
            Write-Host "Restored Desktop items"
          }
          
          if (Test-Path "$extractPath\RustDesk") {
            $rustdeskConfig = "$env:APPDATA\RustDesk"
            if (-not (Test-Path $rustdeskConfig)) { New-Item -ItemType Directory -Path $rustdeskConfig -Force | Out-Null }
            robocopy "$extractPath\RustDesk" $rustdeskConfig /E /COPYALL /R:3 /W:5 /IT
            Write-Host "Restored RustDesk configuration"
          }
          
          # Cleanup
          Remove-Item $restoreDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
          
          Write-Host "=== Backup restoration completed successfully! ==="

      # --- CRD FIRST (prevent code timeout) ---
      - name: Set CRD flag early (safe read)
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          if ($crd.Length -gt 0) { 
            "CRD_ENABLED=1" | Out-File -Append $env:GITHUB_ENV 
          } else { 
            "CRD_ENABLED=0" | Out-File -Append $env:GITHUB_ENV 
          }
          Write-Host "CRD_ENABLED=$([int]($crd.Length -gt 0))"

      - name: Install Chrome Remote Desktop Host (if missing)
        if: env.CRD_ENABLED == '1'
        run: |
          $exe = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "CRD host not found, attempting install (EXE -> MSI fallback)..."
            $exePath = "$env:TEMP\chromeremotedesktophost.exe"
            $ok = $false
            try {
              Invoke-WebRequest -Uri "https://dl.google.com/support/remote_assistance/ChromotingHostSetup.exe" -OutFile $exePath -ErrorAction Stop
              Start-Process -FilePath $exePath -ArgumentList "/silent","/install" -Wait
              Remove-Item $exePath -Force
              $ok = $true
            } catch {
              Write-Host "EXE installer failed or missing: $($_.Exception.Message)"
            }
            if (-not $ok) {
              $msi = "$env:TEMP\chromeremotedesktophost.msi"
              try {
                Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msi -ErrorAction Stop
                Start-Process msiexec.exe -ArgumentList "/i","`"$msi`"","/quiet","/norestart" -Wait
                Remove-Item $msi -Force
              } catch {
                Write-Error "CRD MSI fallback failed: $($_.Exception.Message)"
                exit 1
              }
            }
          } else {
            Write-Host "CRD host already installed."
          }

      - name: Run Chrome Remote Desktop (accept raw code / full cmd / url) with PIN
        if: env.CRD_ENABLED == '1'
        run: |
          $raw = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          $pin = "${{ inputs.crd_pin }}".Trim()
          if ($pin -notmatch '^\d{6,12}$') { Write-Error "crd_pin must be 6–12 digits."; exit 1 }
          
          $starter = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (-not (Test-Path $starter)) { Write-Error "remoting_start_host.exe not found."; exit 1 }
          
          $isFull = $false; $code = $null
          if ($raw -match 'remoting_start_host\.exe') { $isFull = $true }
          if ($raw -match '--code\s*=\s*"?([^"\s]+)') { $code = ([regex]::Match($raw,'--code\s*=\s*"?([^"\s]+)')).Groups[1].Value }
          elseif ($raw -match '^4\/') { $code = $raw }
          
          if ($code) {
            $redir = "https://remotedesktop.google.com/_/oauthredirect"
            $name = $Env:COMPUTERNAME
            $args = @("--code=""$code""","--redirect-url=""$redir""","--name=""$name""","--pin=""$pin""")
            Start-Process -FilePath $starter -ArgumentList $args
          } elseif ($isFull) {
            $tmp = "$env:TEMP\crd_full.ps1"
            Set-Content -Path $tmp -Value $raw -Encoding UTF8
            powershell -ExecutionPolicy Bypass -File $tmp
          } else {
            Write-Error "Could not detect CRD code. Provide raw code (4/...), full command, or string containing --code=\"4/...\""
            exit 1
          }
          Write-Host "CRD launch step completed with PIN."

      - name: Verify CRD registration (service + recent logs)
        if: env.CRD_ENABLED == '1'
        run: |
          $svcName = "Chrome Remote Desktop Service"
          $deadline = (Get-Date).AddSeconds(60)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            $svc = Get-Service -Name $svcName -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -in 'Running','StartPending') { $ok = $true; break }
            Start-Sleep -Seconds 3
          }
          if ($ok) { Write-Host "[$svcName] status: Running or starting." }
          else { Write-Warning "[$svcName] not running yet." }
          
          $logDir = "$env:ProgramData\Google\Chrome Remote Desktop"
          if (Test-Path $logDir) {
            Get-ChildItem $logDir -Filter "host*.log" | Sort-Object LastWriteTime -Descending | Select-Object -First 2 | ForEach-Object {
              Write-Host "----- LOG: $($_.FullName) -----"
              Get-Content $_.FullName -Tail 200
            }
          } else { Write-Host "CRD log directory not found: $logDir" }

      # --- Continue with the rest after CRD is launched ---
      - name: Decide hostname + runtime
        run: |
          if ("${{ inputs.rdp_count }}" -gt 1) { $hn = "bullet${{ matrix.id }}" } else { $hn = "bullet" }
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV
          
          function Yes($v){ "$v" -match '^(?i:true|1|yes|on)$' }
          function IntOr($v,$d){ if("$v" -match '^\d+$'){ [int]$v } else { [int]$d } }
          
          $runtime = IntOr("${{ inputs.runtime_minutes }}",355)
          if (Yes("${{ inputs.quick_test }}")) { $runtime = 5 }
          if (-not (Yes("${{ inputs.quick_test }}")) -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Hostname: $hn | Runtime: $runtime"

      # ---------- PURGE only for SINGLE INSTANCE ----------
      - name: Purge bullet* devices (single-instance only)
        if: ${{ needs.setup.outputs.multi == '0' }}
        run: |
          function Yes($v){ "$v" -match '^(?i:true|1|yes|on)$' }
          if (Yes("${{ inputs.do_purge }}")) {
            try {
              $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
              $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
              $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
              foreach($d in $list.devices){
                if ($d.hostname -match '^bullet[0-9]*$'){
                  Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" } -ErrorAction SilentlyContinue
                }
              }
              Write-Host "Purged bullet* devices (if any)."
            } catch { Write-Host "Purge warning: $($_.Exception.Message)" }
          } else { Write-Host "Purge disabled." }

      - name: Install + Up Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri $url -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout | Out-Null
          & $ts up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip4 = & $ts ip -4 | Select-Object -First 1
          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV
          Write-Host "Tailscale IPv4: $ip4"

      - name: Enable RDP user + firewall
        run: |
          $u=$env:RDP_USER; $p=$env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
            Add-LocalGroupMember -Group "Administrators" -Member $u -EA SilentlyContinue
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -EA SilentlyContinue
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Write-Host "RDP ready. user=$u pass=$p host=$env:TS_HOSTNAME ip=$env:TAILSCALE_IP"

      - name: Install Python libs (pyautogui/pynput/pillow)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall pyautogui pynput pillow
          python -c "import pyautogui, pynput, PIL; print('Python libs OK')"

      - name: Install RustDesk
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $rdExe)) {
            try {
              $rdUrl = "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi"
              $installerPath = "$env:TEMP\rustdesk.msi"
              Invoke-WebRequest -Uri $rdUrl -OutFile $installerPath
              Start-Process msiexec.exe -ArgumentList "/i","`"$installerPath`"","/quiet","/norestart" -Wait
              Remove-Item $installerPath -Force
            } catch {
              Write-Host "MSI install failed, trying winget…"
              winget install --id RustDesk.RustDesk -e --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
            }
          }
          if (-not (Test-Path $rdExe)) { Write-Error "RustDesk not found after install"; exit 1 }
          Write-Host "RustDesk installed."

      - name: Open RustDesk ports (TCP 21115-21119, UDP 21116)
        run: |
          for ($p=21115; $p -le 21119; $p++) {
            $name = "APP-PORT-TCP-$p"
            netsh advfirewall firewall delete rule name=$name 2>$null
            netsh advfirewall firewall add rule name=$name dir=in action=allow protocol=TCP localport=$p
          }
          $udpName = "APP-PORT-UDP-21116"
          netsh advfirewall firewall delete rule name=$udpName 2>$null
          netsh advfirewall firewall add rule name=$udpName dir=in action=allow protocol=UDP localport=21116

      - name: Launch RustDesk (foreground) + Screenshot to Gofile
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          Start-Process -FilePath $rdExe -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          
          $screenshotPath = "$env:TEMP\rustdesk_${{ matrix.id }}.png"
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose(); $bitmap.Dispose()
          
          $curlResult = curl -F "file=@$screenshotPath" https://store1.gofile.io/uploadFile
          $json = $curlResult | ConvertFrom-Json
          if ($json.status -eq "ok") {
            "SCREENSHOT_URL=$($json.data.downloadPage)" | Out-File -Append $env:GITHUB_ENV
          }

      # --- BACKUP ALL DATA BEFORE EXIT ---
      - name: Backup RDP data and upload to Gofile
        if: always()
        run: |
          $backupDir = "$env:TEMP\backup_data_${{ matrix.id }}"
          $zipPath   = "$env:TEMP\backup_${{ matrix.id }}.zip"
          
          New-Item -ItemType Directory -Path $backupDir -Force | Out-Null
          New-Item -ItemType Directory -Path "$backupDir\Users\Bullettemporary" -Force | Out-Null
          New-Item -ItemType Directory -Path "$backupDir\AppData" -Force | Out-Null
          New-Item -ItemType Directory -Path "$backupDir\Desktop" -Force | Out-Null
          
          Write-Host "=== Starting comprehensive backup ==="
          
          # Backup user profile
          if (Test-Path "C:\Users\Bullettemporary") {
            Write-Host "Backing up C:\Users\Bullettemporary..."
            robocopy "C:\Users\Bullettemporary" "$backupDir\Users\Bullettemporary" /E /COPYALL /R:2 /W:3 /XD "Temp" "Temporary Internet Files" "AppData\Local\Temp" /XF "*.tmp" "*.log"
          }
          
          # Backup AppData (important for RustDesk/RDP settings)
          if (Test-Path "$env:APPDATA") {
            Write-Host "Backing up AppData..."
            robocopy "$env:APPDATA" "$backupDir\AppData" /E /COPYALL /R:2 /W:3 /XD "Temp" "Microsoft\Windows\Caches"
          }
          
          # Backup Desktop items
          if (Test-Path "$env:USERPROFILE\Desktop") {
            Write-Host "Backing up Desktop..."
            robocopy "$env:USERPROFILE\Desktop" "$backupDir\Desktop" /E /COPYALL /R:2 /W:3
          }
          
          # Backup RustDesk config if exists
          $rustdeskConfig = "$env:APPDATA\RustDesk"
          if (Test-Path $rustdeskConfig) {
            Write-Host "Backing up RustDesk config..."
            robocopy $rustdeskConfig "$backupDir\RustDesk" /E /COPYALL /R:2 /W:3
          }
          
          # Create metadata file with backup info
          $metadata = @"
          Backup Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          Hostname: $env:TS_HOSTNAME
          Instance ID: ${{ matrix.id }}
          Tailscale IP: $env:TAILSCALE_IP
          CRD Enabled: $env:CRD_ENABLED
          "@
          $metadata | Out-File "$backupDir\backup_info.txt" -Encoding UTF8
          
          Write-Host "Compressing backup archive..."
          Compress-Archive -Path "$backupDir\*" -DestinationPath $zipPath -Force -CompressionLevel Optimal
          
          Write-Host "Uploading backup to Gofile..."
          $uploadResult = curl -F "file=@$zipPath" https://store1.gofile.io/uploadFile
          $json = $uploadResult | ConvertFrom-Json
          
          if ($json.status -eq "ok") {
            $backupLink = $json.data.downloadPage
            Write-Host "========================================="
            Write-Host "BACKUP SUCCESSFUL!"
            Write-Host "Download URL: $backupLink"
            Write-Host "========================================="
            "BACKUP_URL=$backupLink" | Out-File -Append $env:GITHUB_ENV
          } else {
            Write-Host "ERROR: Backup upload failed!"
            Write-Host "Response: $uploadResult"
          }
          
          # Cleanup
          Remove-Item $backupDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue

      - name: Keep alive (to ${{ env.RUNTIME_MINUTES }} mins)
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            $mode = if ("$env:CRD_ENABLED" -eq '1') { '[CRD+RustDesk/RDP]' } else { '[RustDesk/RDP]' }
            $backupStatus = if ("$env:BACKUP_URL") { "Backup: ✓" } else { "Backup: ✗" }
            Write-Host ("$mode Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " ends at " + $end.ToString("HH:mm:ss") + " | Screenshot: $env:SCREENSHOT_URL | $backupStatus")
            Start-Sleep -Seconds 60
          }

      - name: Dispatch next or stop
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cycles = [int]"${{ inputs.cycles }}"
          if ($cycles -gt 0) {
            $next = $cycles - 1
            if ($next -le 0) {
              $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-stop.yml/dispatches"
              $hdr = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
              $payload = @{ 
                ts_tailnet="${{ inputs.ts_tailnet }}"
                ts_api_key="${{ inputs.ts_api_key }}"
                base_prefix="bullet"
                max_count="10"
                dry_run="false"
              }
              $body = @{ ref="${{ github.ref_name }}"; inputs=$payload } | ConvertTo-Json -Depth 20
              Invoke-WebRequest -Method POST -Uri $url -Headers $hdr -Body $body | Out-Null
              Write-Host "Dispatched STOP."
            } else {
              $payload = @{
                ts_tailnet = "${{ inputs.ts_tailnet }}"
                ts_api_key = "${{ inputs.ts_api_key }}"
                ts_authkey = "${{ inputs.ts_authkey }}"
                quick_test = "${{ inputs.quick_test }}"
                runtime_minutes = "${{ inputs.runtime_minutes }}"
                do_purge = "${{ inputs.do_purge }}"
                cycles = "$next"
                rdp_count = "${{ inputs.rdp_count }}"
                crd_code = "${{ inputs.crd_code }}"
                crd_pin = "${{ inputs.crd_pin }}"
                backup_url = "${{ env.BACKUP_URL }}"
              }
              $url2 = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-B.yml/dispatches"
              $hdr2 = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
              $body2 = @{ ref="${{ github.ref_name }}"; inputs=$payload } | ConvertTo-Json -Depth 20
              Invoke-WebRequest -Method POST -Uri $url2 -Headers $hdr2 -Body $body2 | Out-Null
              Write-Host "Dispatched Workflow B with cycles=$next and backup_url=${{ env.BACKUP_URL }}"
            }
          } else {
            Write-Host "No cycles configured. Done."
            if ("$env:BACKUP_URL") {
              Write-Host "========================================="
              Write-Host "FINAL BACKUP URL FOR THIS SESSION:"
              Write-Host "$env:BACKUP_URL"
              Write-Host "========================================="
              Write-Host "Use this URL as 'backup_url' input next time to restore state."
            }
          }
