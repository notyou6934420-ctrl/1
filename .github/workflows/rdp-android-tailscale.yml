name: Android 12 noVNC via Tailscale

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip openjdk-11-jdk xvfb x11vnc fluxbox net-tools python3

      - name: Setup noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

      - name: Install Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O sdk.zip
          mkdir -p android-sdk/cmdline-tools
          unzip sdk.zip -d android-sdk/cmdline-tools
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/cmdline-tools/bin:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "emulator" "platforms;android-31" "system-images;android-31;google_apis;x86_64"

      - name: Create AVD
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/cmdline-tools/bin:$PATH
          echo "no" | avdmanager create avd -n android12 -k "system-images;android-31;google_apis;x86_64"

      - name: Start X server
        run: |
          Xvfb :1 -screen 0 1280x720x16 &
          export DISPLAY=:1
          fluxbox &
          x11vnc -display :1 -nopw -forever -shared -rfbport 5900 &

      - name: Start Android Emulator
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export DISPLAY=:1
          nohup $ANDROID_HOME/emulator/emulator -avd android12 -no-audio -gpu swiftshader_indirect > emulator.log 2>&1 &
          sleep 90

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-kk5XXvZJFA11CNTRL-vCh5MqGZeSFr9CnjZ4FdSFRsz4Q7vsL6 --hostname github-android

      - name: Start noVNC (Web Access)
        run: |
          ./noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &

      - name: Keep Runner Alive
        run: sleep 21600
