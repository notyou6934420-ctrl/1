name: Ultra Fast API Requester

on:
  workflow_dispatch:
    inputs:
      threads:
        description: 'Number of threads'
        default: '100'
      duration:
        description: 'Run duration (minutes)'
        default: '120'

jobs:
  fast-requester:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.duration || '10') }}
    
    steps:
    - name: Install Python and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip
        pip3 install requests
    
    - name: Create Python script
      run: |
        cat > requester.py <<'EOF'
import requests
import time
import threading
from concurrent.futures import ThreadPoolExecutor
import os
import sys

NUM_THREADS = int(os.getenv('THREADS', '30'))
DURATION = int(os.getenv('DURATION', '5')) * 60

url = "https://mknetworkbd.com/API/api_handler.php"
headers = {
    "User-Agent": "Mozilla/5.0",
    "cookie": "mk_lang=en; mk_remember=fb1b80350fee:0797260b16fa223e8588dca475e12dfebd764d5d98a48b8b2dfc6e6b91a30172; PHPSESSID=gmo9mkdls75drgheogpqrjn3ik",
    "Content-Type": "application/x-www-form-urlencoded"
}
data = {"action": "get_number", "range": "9929876XXXXX"}

count = 0
success = 0
lock = threading.Lock()
running = True
start = time.time()

def worker():
    global count, success
    session = requests.Session()
    while running:
        try:
            r = session.post(url, headers=headers, data=data, timeout=5)
            with lock:
                count += 1
                if r.status_code == 200:
                    success += 1
                if count % 100 == 0:
                    elapsed = time.time() - start
                    print(f"\r📊 {count} req | {success} ok | {count/elapsed:.0f} rps", end="")
        except:
            with lock:
                count += 1
        time.sleep(0.003)

print(f"🚀 Starting with {NUM_THREADS} threads for {DURATION/60} minutes...")
with ThreadPoolExecutor(max_workers=NUM_THREADS) as ex:
    futures = [ex.submit(worker) for _ in range(NUM_THREADS)]
    time.sleep(DURATION)
    running = False
    time.sleep(2)

elapsed = time.time() - start
print(f"\n✅ Done! {count} requests in {elapsed:.1f}s ({count/elapsed:.0f} RPS)")
EOF

    - name: Run requester
      env:
        THREADS: ${{ github.event.inputs.threads || '30' }}
        DURATION: ${{ github.event.inputs.duration || '5' }}
      run: python3 requester.py
